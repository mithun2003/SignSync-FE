<!-- admin-layout.component.html -->
<div class="flex min-h-screen h-screen overflow-hidden bg-bg-primary text-white">

  <!-- Mobile Overlay -->
  @if (showMobileMenu()) {
    <button (click)="toggleMobileMenu()"
         class="fixed inset-0 bg-black/60 backdrop-blur-sm z-40 md:hidden">
    </button>
  }

  <!-- Sidebar -->
  <aside [class]="showMobileMenu() ? 'translate-x-0' : '-translate-x-full'"
         class="fixed inset-y-0 left-0 z-50 transform
                transition-transform duration-300 ease-out
                md:relative md:translate-x-0">
    <app-admin-sidebar
      [collapsed]="sidebarCollapsed()"
      (collapsedChange)="onSidebarCollapse($event)"
      (mobileMenuClose)="toggleMobileMenu()">
    </app-admin-sidebar>
  </aside>

  <!-- Main Content -->
  <div class="flex-1 flex flex-col min-h-screen overflow-hidden">
    <app-admin-header
      (mobileMenuToggle)="toggleMobileMenu()">
    </app-admin-header>

    <main class="flex-1 p-6 bg-bg-primary overflow-auto">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
